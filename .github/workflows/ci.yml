name: CI

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    env:
      VITE_FORMSUBMIT_RECEIVER: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: E2E (production-like)
        run: npm run test:e2e
