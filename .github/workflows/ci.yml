name: CI

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    env:
      VITE_FORMSUBMIT_RECEIVER: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Logics docs lint
        run: python3 logics/skills/logics-doc-linter/scripts/logics_lint.py --require-status

      - name: Logics workflow sync guard
        run: |
          python3 logics/skills/logics-flow-manager/scripts/logics_flow.py sync close-eligible-requests
          git diff --exit-code -- logics/request

      - name: Logics workflow audit (baseline, blocking)
        run: python3 logics/skills/logics-flow-manager/scripts/workflow_audit.py --legacy-cutoff-version 1.1.0 --group-by-doc

      - name: Logics workflow audit (strict report, non-blocking)
        continue-on-error: true
        run: python3 logics/skills/logics-flow-manager/scripts/workflow_audit.py --format json

      - name: Logics Python tests
        run: python3 -m unittest discover -s logics/skills/tests -p "test_*.py" -v

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: E2E (production-like)
        run: npm run test:e2e
